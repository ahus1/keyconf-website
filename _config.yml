title: "KeyConf26: Keycloak Community 1-Day-Conference"
description: Our annual conference dedicated to the Keycloak users' community to interact, learn, share, and exchange notes on Keycloak IAM technology and use cases.
url: https://keyconf.dev
baseurl: "" # the subpath of your site, e.g. /blog
callforsessions: https://forms.office.com/pages/responsepage.aspx?id=hFQsXiLlnUeRylFdbgziKBgok6UO9mxHnShifZvG4ehUQUhMTlJZODZYMThENlVJVjhEU0lEWVRRWi4u&route=shorturl
showTicketSale: false
rsvpLivestream: false
showLivestream: false
showRecording: false
showCallforsessions: true
showRecap: false

# some default values for Front Matter
defaults:
  -
    scope:
      path: "" # emtpy means all files
      type: posts
    values:
      layout: post

markdown: kramdown

# Use the following plug-ins
plugins:
  - jekyll-sitemap # Create a sitemap using the official Jekyll sitemap gem

# Exclude these files from your production _site
exclude:
  - README.md
  - .git
  - .sass-cache
  - .jekyll-cache
  - .idea
  - Gemfile
  - '2024'
  - '2025'
  - Gemfile.lock
  - docker-compose.yml
